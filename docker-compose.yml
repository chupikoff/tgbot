services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=Europe/Kyiv
    privileged: true
    volumes:
      - /home/chpk/backups:/home/chpk/backups
      - /home/chpk/tgbot/.env:/home/chpk/tgbot/.env:ro
      - /home/chpk/tgbot/docker-compose.yml:/home/chpk/tgbot/docker-compose.yml:ro
      - /etc/transmission-daemon/settings.json:/etc/transmission-daemon/settings.json:ro
      - /etc/samba/smb.conf:/etc/samba/smb.conf:ro
      - /etc/minidlna.conf:/etc/minidlna.conf:ro
      - /home/chpk/media:/home/chpk/media:ro
      - /var/run/dbus:/var/run/dbus
      - /run/systemd/private:/run/systemd/private
      - /run/systemd/system:/run/systemd/system
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
