name: Deploy Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          cd /home/chpk/tgbot
          git pull origin main
          docker compose down
          docker compose up --build -d
          echo "✅ Deploy completed successfully"
